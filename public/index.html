<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your PC ran into a problem</title>
</head>
<body style="background:#0078d7;margin:0">
  <div id="app-mount"></div>
  <script src="loader.js"></script>
  <script>
    setTimeout(function () {
      var mount = document.getElementById("app-mount");
      if (mount && !mount.innerHTML.trim()) {
        mount.innerHTML =
          '<p style="color:#fff;padding:24px;font-family:Segoe UI,sans-serif">' +
          "Erreur de chargement. Videz le cache (Ctrl+F5) ou redeployez le site.</p>";
      }
    }, 4000);
  </script>
</body>
</html>
